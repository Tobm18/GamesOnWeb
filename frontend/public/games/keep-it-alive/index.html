<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keep It Alive</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/keep-it-alive.css">
</head>
<body>
    <div class="game-container">

        <canvas id="gameCanvas"></canvas>

        <div id="score" class="score">0 pts</div>

        <div id="powerupLegend" class="powerup-legend hidden">
            <h4>BONUS</h4>
            <div class="legend-item">
                <span class="legend-icon shield"><i class="fa-solid fa-shield"></i></span>
                <span class="legend-text">Bouclier</span>
            </div>
            <div class="legend-item">
                <span class="legend-icon slowmo"><i class="fa-solid fa-clock"></i></span>
                <span class="legend-text">Ralenti</span>
            </div>
            <div class="legend-item">
                <span class="legend-icon doublepoints"><i class="fa-solid fa-star"></i></span>
                <span class="legend-text">Points x2</span>
            </div>
        </div>

        <div id="gameOver" class="game-over hidden">
            <div class="modal-card">
                <h2>Game Over</h2>
                <p id="survivalMessage" class="survival-message"></p>
                <div class="stats-container">
                    <p class="final-score">Score Final: <span id="finalScore">0</span> pts</p>
                </div>
                <div class="card-actions">
                    <button id="restartBtn" class="restart-btn">Rejouer</button>
                </div>
            </div>
        </div>

        <div id="startScreen" class="start-screen">
            <div class="modal-card">
                <h1>Keep It Alive</h1>
                <p class="subtitle">Survivez le plus longtemps possible !</p>
                
                <div class="controls-section">
                    <h3>Contrôles</h3>
                    <div class="control-item">
                        <span class="key">ESPACE</span> ou <span class="key">CLIC</span>
                        <span class="control-desc">Sauter</span>
                    </div>
                    <div class="control-item">
                        <span class="key">←</span> <span class="key">→</span>
                        <span class="control-desc">Se déplacer</span>
                    </div>
                </div>
                
                <div class="objectives-section">
                    <h3>Objectifs</h3>
                    <ul>
                        <li>Collectez des points</li>
                        <li>Évitez les obstacles</li>
                        <li>Ne sortez pas de l'écran</li>
                        <li>Attrapez les bonus</li>
                    </ul>
                </div>
                
                <div class="card-actions">
                    <button id="startBtn" class="start-btn">Commencer</button>
                </div>
            </div>
        </div>
    </div>
    <script src="js/keep-it-alive.js"></script>
</body>
</html>
